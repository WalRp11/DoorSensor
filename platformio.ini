[platformio]
default_envs = doorsensor-ota

[env:doorsensor]
platform  = espressif32
board     = lolin_c3_mini
framework = arduino

lib_deps =
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit NeoPixel@^1.12

monitor_speed = 115200
monitor_port  = COM4
upload_speed  = 460800
upload_port   = COM4

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:doorsensor-ota]
platform  = espressif32
board     = lolin_c3_mini
framework = arduino

lib_deps =
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit NeoPixel@^1.12

monitor_speed    = 115200
upload_protocol  = espota
upload_port      = door-sensor.local

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
